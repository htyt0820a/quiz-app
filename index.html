<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一般常識クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>一般常識クイズ</h1>
    </header>

    <main id="app">
      <!-- スタート画面 -->
      <section id="start-screen" class="screen active">
        <div class="card">
          <p class="intro-text">全10問の一般常識クイズに挑戦しよう！</p>
          <button id="start-btn" class="btn btn-primary">スタート</button>
        </div>
      </section>

      <!-- クイズ画面 -->
      <section id="quiz-screen" class="screen">
        <div class="card">
          <div class="progress-bar-wrap">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <p class="question-counter"><span id="current-num">1</span> / <span id="total-num">10</span>問</p>
          <p id="question-text" class="question-text"></p>
          <div id="choices" class="choices"></div>
          <div id="feedback" class="feedback hidden">
            <p id="feedback-text"></p>
            <p id="feedback-explanation" class="explanation"></p>
          </div>
          <button id="next-btn" class="btn btn-primary hidden">次の問題へ</button>
        </div>
      </section>

      <!-- 結果画面 -->
      <section id="result-screen" class="screen">
        <div class="card">
          <h2 class="result-title">結果発表</h2>
          <p class="score-text"><span id="total-num-result">10</span>問中 <span id="final-score">0</span> 問正解</p>
          <p id="result-message" class="result-message"></p>
          <button id="retry-btn" class="btn btn-primary">もう一度挑戦する</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
